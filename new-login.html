  <script>
    function loginStaticUser(event) {
      event.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Check registered users in localStorage
      const storedUser = localStorage.getItem('static_user_' + email);
      
      let authenticated = false;
      let userName = "Vijay Mahes";

      if (storedUser) {
        const userObj = JSON.parse(storedUser);
        if (userObj.password === password) {
          authenticated = true;
          userName = userObj.name;
        } else {
          alert('Incorrect password!');
          return false;
        }
      } else {
        // Fallback for default user
        if (email.toLowerCase() === 'vijaypradhap2004@gmail.com') {
          authenticated = true;
          userName = "Vijay Mahes";
          // Seed the localstorage so dashboard works properly
          const defaultUser = {
            name: "Vijay Mahes",
            email: "Vijaypradhap2004@gmail.com",
            gender: "Male",
            state: "Kerala",
            district: "Ernakulam",
            is_vip: false
          };
          localStorage.setItem('static_user_' + email, JSON.stringify(defaultUser));
        } else {
          alert('Email not registered! Please register first.');
          return false;
        }
      }

      if (authenticated) {
        localStorage.setItem('logged_in', 'true');
        localStorage.setItem('username', email);
        alert('Login Successful! Redirecting to your dashboard...');
        window.location.href = 'dashboard.html';
      }
      return false;
    }
  </script>

  <!-- Dynamic Header Links Script -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const nav = document.getElementById('navbar-links');
      const isLoggedIn = localStorage.getItem('logged_in') === 'true';
      if (isLoggedIn) {
        // Add Dashboard
        const dashLi = document.createElement('li');
        dashLi.innerHTML = '<a href="dashboard.html" class="nav-link">Dashboard</a>';
        nav.appendChild(dashLi);
        
        // Add Logout
        const logoutLi = document.createElement('li');
        logoutLi.innerHTML = '<a href="#" onclick="logoutStatic(); return false;" class="nav-link">Logout</a>';
        nav.appendChild(logoutLi);
      } else {
        // Add Register/Login
        const loginLi = document.createElement('li');
        loginLi.innerHTML = '<a href="new-login.html" class="nav-link">Register/Login</a>';
        nav.appendChild(loginLi);
      }
    });
    function logoutStatic() {
      localStorage.removeItem('logged_in');
      localStorage.removeItem('username');
      alert('Logged out successfully.');
      window.location.href = 'index.html';
    }
  </script>
