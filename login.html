<!-- Password Complexity Check -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const passwordInput = document.getElementById('password');
    const passwordPattern = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&])[A-Za-z\d@$!%*?&]{8,}$/;

    passwordInput.addEventListener('input', function() {
        const password = this.value;
        const isValid = passwordPattern.test(password);

        if (!isValid) {
            this.setCustomValidity('Password must contain at least 8 characters, including at least one uppercase letter, one lowercase letter, one number, and one special character.');
        } else {
            this.setCustomValidity('');
        }
    });
});

function registerStaticUser(event) {
  event.preventDefault();
  const fullName = document.getElementById('full-name').value;
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirm-password').value;
  const gender = document.getElementById('gender').value;
  const state = document.getElementById('state').value;
  const district = document.getElementById('district').value;

  if (password !== confirmPassword) {
    alert("Passwords do not match!");
    return false;
  }

  // Save details to localStorage
  const userDetails = {
    name: fullName,
    email: email,
    password: password,
    gender: gender,
    state: state,
    district: district,
    is_vip: false
  };

  localStorage.setItem('static_user_' + email, JSON.stringify(userDetails));
  alert('Registration Successful! (Static Demo Mode) Check your email simulator - Redirecting to login page...');
  window.location.href = 'new-login.html';
  return false;
}
</script>

    document.addEventListener('DOMContentLoaded', function() {
      const nav = document.getElementById('navbar-links');

      if (isLoggedIn) {

        loginLi.innerHTML = '<a href="new-login.html" class="nav-link">Register/Login</a>';
        nav.appendChild(loginLi);
      }

    function logoutStatic() {
      localStorage.removeItem('logged_in');
